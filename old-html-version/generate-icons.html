<!DOCTYPE html>
<!-- Run this file once in a browser to download the PWA icons -->
<html>
<head><title>Generate LMP Icons</title></head>
<body>
<p>Click each button to download the icon, then place both files in the <code>old-html-version/</code> folder.</p>
<button onclick="generate(192)">Download icon-192.png</button>
<button onclick="generate(512)">Download icon-512.png</button>
<script>
function generate(size) {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#050b14';
  ctx.fillRect(0, 0, size, size);

  // Amber gradient circle
  const grad = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size * 0.38);
  grad.addColorStop(0, '#fda085');
  grad.addColorStop(1, '#f6d365');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(size/2, size/2, size * 0.38, 0, Math.PI * 2);
  ctx.fill();

  // Play triangle
  const s = size * 0.18;
  const cx = size / 2 + size * 0.03;
  const cy = size / 2;
  ctx.fillStyle = '#050b14';
  ctx.beginPath();
  ctx.moveTo(cx - s * 0.6, cy - s);
  ctx.lineTo(cx - s * 0.6, cy + s);
  ctx.lineTo(cx + s * 0.9, cy);
  ctx.closePath();
  ctx.fill();

  // Download
  const a = document.createElement('a');
  a.download = `icon-${size}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
